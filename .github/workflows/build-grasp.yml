name: Build Grasp iOS IPA (Free Cloud Compiler)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub web UI

jobs:
  build:
    name: Compile Unsigned IPA
    runs-on: macos-14 # Uses Apple Silicon M1/M2 runners for extreme speed
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Version
        run: |
          # Prioritizes Xcode 16 versions to match the modern XcodeGen output format
          sudo xcode-select -switch /Applications/Xcode_16.2.app || \
          sudo xcode-select -switch /Applications/Xcode_16.1.app || \
          sudo xcode-select -switch /Applications/Xcode_16.0.app || \
          sudo xcode-select -switch /Applications/Xcode_15.4.app || \
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App (DerivedData + Code Signing Disabled)
        run: |
          xcodebuild build \
            -project Grasp.xcodeproj \
            -scheme Grasp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Ad-hoc Sign & Package into IPA
        run: |
          APP_PATH="build_derived/Build/Products/Release-iphoneos/Grasp.app"
          
          echo "=== Listing .app contents ==="
          ls -laR "$APP_PATH"
          
          echo "=== Creating minimal entitlements ==="
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.application-groups</key>
              <array>
                  <string>group.com.antigravity.grasp</string>
              </array>
          </dict>
          </plist>
          EOF
          
          echo "=== Ad-hoc signing the .app bundle ==="
          # Ad-hoc sign with - identity (no certificate needed)
          codesign --force --deep --sign - --entitlements entitlements.plist "$APP_PATH"
          
          echo "=== Verifying signature ==="
          codesign -dvv "$APP_PATH" || true
          
          echo "=== Packaging into IPA ==="
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Grasp.ipa Payload
          
          echo "=== IPA packaging successful ==="
          echo "File size:"
          du -sh Grasp.ipa
          echo "IPA contents:"
          unzip -l Grasp.ipa | tail -20

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grasp-Unsigned-IPA
          path: Grasp.ipa
          if-no-files-found: error
