name: Build Grasp iOS IPA (Free Cloud Compiler)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub web UI

jobs:
  build:
    name: Compile Unsigned IPA
    runs-on: macos-14 # Uses Apple Silicon M1/M2 runners for extreme speed
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Version
        run: |
          # Prioritizes Xcode 16 versions to match the modern XcodeGen output format
          sudo xcode-select -switch /Applications/Xcode_16.2.app || \
          sudo xcode-select -switch /Applications/Xcode_16.1.app || \
          sudo xcode-select -switch /Applications/Xcode_16.0.app || \
          sudo xcode-select -switch /Applications/Xcode_15.4.app || \
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App (DerivedData + Code Signing Disabled)
        run: |
          xcodebuild build \
            -project Grasp.xcodeproj \
            -scheme Grasp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # Move the compiled app binary from release-iphoneos products into Payload folder
          cp -r build_derived/Build/Products/Release-iphoneos/Grasp.app Payload/
          # Zip the Payload folder and rename extension to .ipa
          zip -r Grasp.ipa Payload
          echo "IPA packaging successful. File size:"
          du -sh Grasp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grasp-Unsigned-IPA
          path: Grasp.ipa
          if-no-files-found: error
