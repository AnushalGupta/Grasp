name: Grasp
options:
  bundleIdPrefix: com.antigravity
  minimumXcodeGenVersion: 2.28.0

targets:
  Grasp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Grasp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.grasp
        INFOPLIST_FILE: Grasp/Info.plist
        SWIFT_VERSION: "5.5"
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone and iPad
        DEVELOPMENT_TEAM: "" # Explicitly empty
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        
        # Explicit Code Signing Disables inside Project Config
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: "Manual"
      configs:
        debug:
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
        release:
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
