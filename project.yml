name: Grasp
options:
  bundleIdPrefix: com.antigravity
  minimumXcodeGenVersion: 2.28.0

targets:
  Grasp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Grasp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.grasp
        INFOPLIST_FILE: Grasp/Info.plist
        SWIFT_VERSION: "5.5"
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone and iPad
        DEVELOPMENT_TEAM: "" # User can populate this if they have a team ID
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
      configs:
        debug:
          CODE_SIGN_IDENTITY: "iPhone Developer"
          PROVISIONING_PROFILE_SPECIFIER: ""
        release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: ""
